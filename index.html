<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Push Test</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .card {
      background: #020617;
      padding: 30px 40px;
      border-radius: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      text-align: center;
    }
    h1 {
      color: #38bdf8;
      margin-bottom: 10px;
    }
    p {
      opacity: 0.9;
    }
    button {
      margin-top: 20px;
      padding: 10px 18px;
      border: none;
      border-radius: 6px;
      background: #38bdf8;
      color: #020617;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover {
      background: #0ea5e9;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>GitHub Push Test 🚀</h1>
    <p>If you see this page, your push worked successfully.</p>
    <button onclick="testPush()">Click Me</button>
  </div>

  <script>
    function testPush() {
      alert("VS Code → GitHub push is working! ✅");
      console.log("Push test confirmed");
    }
  </script>

</body>
</html>
